---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus3-blobstorage-claim-{{ .Values.storageClassNameRbd }}
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/resource-policy": keep # https://helm.sh/docs/howto/charts_tips_and_tricks/#tell-helm-not-to-uninstall-a-resource
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: {{ .Values.storageClassNameRbd }}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus3-data-pvc-{{ .Values.storageClassNameRbd }}
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/resource-policy": keep # https://helm.sh/docs/howto/charts_tips_and_tricks/#tell-helm-not-to-uninstall-a-resource
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: {{ .Values.storageClassNameRbd }}

{{- range $.Values.projectStorage }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus3-blobstorage-project-claim-rbd-{{ .name | splitList "." | last }}
  namespace: {{ $.Values.namespace }}
  annotations:
    "helm.sh/resource-policy": keep # https://helm.sh/docs/howto/charts_tips_and_tricks/#tell-helm-not-to-uninstall-a-resource
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .size | default "50Gi" }}
  storageClassName: {{ $.Values.storageClassNameRbd }}
{{- end }}