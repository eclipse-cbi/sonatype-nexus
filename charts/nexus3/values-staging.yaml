# Default values for nexus3.

appName: nexus3
namespace: repo-eclipse-org-staging
host: repo-staging.eclipse.org
dockerProxyHost: docker-registry.eclipse.org

image:
  # Sonatype Official Public Image
  repository: sonatype/nexus3
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  # tag:

nexusPort: 8081
httpPort: 8080
dockerRegistryPort: 5003

resources:
  requests:
    cpu: 2
    memory: 4Gi
  limits:
    cpu: 2
    memory: 4Gi

# JVM Configuration
# With 4Gi container memory, allocate:
# - 2560M for heap (2.5GB)
# - 1024M for direct memory (1GB)
# - Remaining ~512MB for overhead (metaspace, thread stacks, etc.)
jvm:
  heapSize: 2560M
  maxDirectMemorySize: 1024M

securityContext:
  seLinuxOptions:
    type: 'spc_t'
    level: 's0:c34,c19'

sidecar:
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

# storage
storageClassNameRbd: ceph-rbd-retain

projectStorage:
# use for proxy repos
  - name: proxy-docker
  - name: proxy-helm
  - name: proxy-pypi
  - name: proxy-maven2
  - name: proxy-npm

# use for projects
  - name: technology.cbi

dbSecretName: nexus3-postgressql-db
secretLicenseName: nxrm-license
